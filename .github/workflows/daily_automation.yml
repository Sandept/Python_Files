name: Daily Python Project Fetcher

on:
  schedule:
    # Runs at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to trigger it manually

permissions:
  contents: write # Required to allow the bot to push code to your repo

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run the Fetch Script
        run: python fetch_daily_project.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Check if there are any changes to commit (prevents errors if the file already existed)
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "Automated update: Picked a new Python mini project"
            git push
          fi
